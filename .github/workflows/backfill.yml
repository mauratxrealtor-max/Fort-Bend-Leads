name: Backfill 365 Days

on:
  workflow_dispatch:
    inputs:
      look_back_days:
        description: 'Days to look back'
        required: false
        default: '365'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  backfill:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4 lxml dbfread playwright

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Decode parcel DB
        run: python3 scraper/decode_parcel.py

      - name: Run backfill scraper
        env:
          LOOK_BACK_DAYS: ${{ github.event.inputs.look_back_days || '365' }}
          RECORDS_OUT: dashboard/backfill.json
          GHL_OUT: data/backfill_ghl.csv
        run: python scraper/fetch.py

      - name: Show summary
        run: python3 scraper/show_backfill_summary.py

      - name: Commit backfill records
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/backfill.json data/backfill_ghl.csv || true
          git commit -m "chore: backfill ${{ github.event.inputs.look_back_days || '365' }}d $(date -u +'%Y-%m-%d %H:%M UTC')" || true
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

  deploy-pages:
    needs: backfill
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
