name: Scrape & Deploy

on:
  schedule:
    - cron: "0 7 * * *"   # 7 AM UTC = 2 AM CDT / 1 AM CST
  workflow_dispatch:        # manual trigger from Actions tab

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Python setup ────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      # ── Dependencies ─────────────────────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install requests beautifulsoup4 lxml dbfread playwright

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      # ── Run scraper ──────────────────────────────────────────────────────────
      - name: Run scraper
        run: python scraper/fetch.py

      # ── Commit updated JSON files ─────────────────────────────────────────
      - name: Commit records
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/records.json data/records.json data/ghl_export.csv || true
          git diff --cached --quiet || git commit -m "chore: update records $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      # ── Deploy dashboard to GitHub Pages ─────────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

  deploy-pages:
    needs: scrape
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
